<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="540" y="70" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">COMPARATIVO</text>
  <text x="540" y="110" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">BRM44HB vs TF55</text>
  
  <!-- VS Badge -->
  <circle cx="540" cy="280" r="40" fill="#f59e0b"/>
  <text x="540" y="292" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">VS</text>
  
  <!-- Product A Card -->
  <rect x="40" y="150" width="450" height="220" rx="16" fill="url(#cardA)"/>
  <text x="265" y="200" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle">Brastemp</text>
  <text x="265" y="240" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">BRM44HB</text>
  <text x="265" y="290" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">R$ 3.149,90</text>
  <text x="265" y="340" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle">⭐ 7.5/10</text>
  
  <!-- Product B Card -->
  <rect x="590" y="150" width="450" height="220" rx="16" fill="url(#cardB)"/>
  <text x="815" y="200" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle">Electrolux</text>
  <text x="815" y="240" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">TF55</text>
  <text x="815" y="290" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">R$ 3.399,90</text>
  <text x="815" y="340" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle">⭐ 7.4/10</text>
  
  <!-- Comparison Table -->
  <rect x="40" y="400" width="1000" height="400" rx="16" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Table Header -->
  <text x="200" y="450" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">ESPECIFICAÇÃO</text>
  <text x="540" y="450" font-family="Arial, sans-serif" font-size="18" fill="#3b82f6" text-anchor="middle">BRM44HB</text>
  <text x="880" y="450" font-family="Arial, sans-serif" font-size="18" fill="#10b981" text-anchor="middle">TF55</text>
  
  <!-- Rows -->
  <line x1="60" y1="470" x2="1020" y2="470" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Capacity -->
  <text x="200" y="520" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">📦 Capacidade</text>
  <text x="540" y="520" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">375L </text>
  <text x="880" y="520" font-family="Arial, sans-serif" font-size="20" fill="#10b981" text-anchor="middle">431L ✓</text>
  
  <!-- Consumption -->
  <text x="200" y="580" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">⚡ Consumo</text>
  <text x="540" y="580" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">54 kWh </text>
  <text x="880" y="580" font-family="Arial, sans-serif" font-size="20" fill="#10b981" text-anchor="middle">49.8 kWh ✓</text>
  
  <!-- Dimensions -->
  <text x="200" y="640" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">📐 Largura</text>
  <text x="540" y="640" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">62.1 cm</text>
  <text x="880" y="640" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">70 cm</text>
  
  <!-- Freezer -->
  <text x="200" y="700" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">❄️ Freezer</text>
  <text x="540" y="700" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">86L</text>
  <text x="880" y="700" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">128L</text>
  
  <!-- Price Row -->
  <text x="200" y="760" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">💰 Preço</text>
  <text x="540" y="760" font-family="Arial, sans-serif" font-size="20" fill="#10b981" text-anchor="middle">R$ 3.149,90 ✓</text>
  <text x="880" y="760" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">R$ 3.399,90 </text>
  
  <!-- Winner Section -->
  
  <rect x="40" y="830" width="1000" height="100" rx="16" fill="#3b82f6"/>
  <text x="540" y="870" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🏆 RECOMENDAÇÃO: BRM44HB</text>
  <text x="540" y="905" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle">Melhor avaliação geral (7.5/10)</text>
  
  
  <!-- Footer / Branding -->
  <text x="540" y="990" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">ComparaTop</text>
  <text x="540" y="1020" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">comparatop.com.br</text>
  
  <!-- CTA -->
  <rect x="390" y="1060" width="300" height="50" rx="25" fill="#f59e0b"/>
  <text x="540" y="1093" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">VER COMPARATIVO COMPLETO →</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="1200" r="80" fill="rgba(59, 130, 246, 0.1)"/>
  <circle cx="980" cy="1250" r="60" fill="rgba(16, 185, 129, 0.1)"/>
  
</svg>